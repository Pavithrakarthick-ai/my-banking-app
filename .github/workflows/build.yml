name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Install Flet
        run: pip install flet

      # Intha step-la '--yes' add panni irukkaen, prompt keta automatic-ah 'yes' nu eduthukum
      - name: Build APK
        run: flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: banking-app-apk
          # Build path Flet-la ippo change aagi irukalam, so try this path
          path: build/apk/*.apk
