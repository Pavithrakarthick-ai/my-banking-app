name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: latest

      - name: Build APK
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: my-app.apk
          path: build/app/outputs/flutter-apk/app-release.apk
